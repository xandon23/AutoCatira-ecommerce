services:
  # ----------------------------------------
  # BANCO DE DADOS (MySQL)
  # ----------------------------------------
  db:
    image: mysql:8.0
    container_name: autozoom_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - autozoom_network

  # ----------------------------------------
  # BACK-END (API Node.js)
  # ----------------------------------------
  backend:
    build: ./backend
    container_name: autozoom_backend
    restart: always
    ports:
      - "3333:3333"
    environment:
      - DB_HOST=db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    depends_on:
      - db
    networks:
      - autozoom_network

  # ----------------------------------------
  # FRONT-END (Interface React)
  # ----------------------------------------
  frontend:
    build: ./frontend
    container_name: autozoom_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - autozoom_network

# ----------------------------------------
# VOLUMES E REDES
# ----------------------------------------
volumes:
  db_data:

networks:
  autozoom_network:
    driver: bridge
